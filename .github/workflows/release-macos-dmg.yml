name: Release macOS DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout release metadata
        uses: actions/checkout@v4
        with:
          path: meta

      - name: Checkout source (tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          path: src

      - name: Select Xcode
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Build and package DMG
        working-directory: src
        env:
          VERSION: ${{ inputs.tag || github.ref_name }}
          # Optional signing/notarization. If unset, the script will skip these steps.
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          bash scripts/build-release-dmg.sh

      - name: Detect release notes
        id: notes
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          NOTES_PATH="meta/docs/releases/${TAG}.md"
          if [[ -f "${NOTES_PATH}" ]]; then
            echo "has_notes=true" >> "${GITHUB_OUTPUT}"
            echo "notes_path=${NOTES_PATH}" >> "${GITHUB_OUTPUT}"
          else
            echo "has_notes=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create GitHub Release (with notes)
        if: steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            src/build/release/*.dmg
            src/build/release/*.sha256

      - name: Create GitHub Release
        if: steps.notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            src/build/release/*.dmg
            src/build/release/*.sha256
